<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Gëzuar Ditëlindjen 🎉</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #2a0018 0%, #000000 75%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* Sfondi me shkëlqim rozë */
  .glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255, 20, 147, 0.25), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.2), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(255, 0, 128, 0.15), transparent 50%);
    animation: pulse 4s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  .emoji {
    position: absolute;
    top: -10%;
    font-size: 2.2rem;
    user-select: none;
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
    filter: drop-shadow(0 0 6px rgba(255, 105, 180, 0.6));
  }

  @keyframes fall {
    from { transform: translateY(-10vh); }
    to   { transform: translateY(110vh); }
  }

  @keyframes sway {
    0%   { margin-left: 0px; }
    50%  { margin-left: 40px; }
    100% { margin-left: 0px; }
  }

  /* Fjalët "Gëzuar Ditëlindjen" në gjuhë të ndryshme */
  #greeting {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .greeting-text {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    font-size: clamp(1rem, 3vw, 1.7rem);
    font-weight: 600;
    color: #ffffff;
    text-shadow:
      0 0 8px #ff1493,
      0 0 16px #ff69b4;
    opacity: 0;
    animation: fadeInOut 1s ease-in-out forwards;
    letter-spacing: 0.5px;
  }

  @keyframes fadeInOut {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
    12%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    88%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.02); }
  }

  #play-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    background: rgba(255, 20, 147, 0.85);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 30px;
    font-family: Arial, sans-serif;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
  }
  #play-btn:active {
    transform: translateX(-50%) scale(0.96);
  }
</style>
</head>
<body>

<div id="stage">
  <div class="glow"></div>
  <div id="emoji-container"></div>
  <div id="greeting"></div>

  <button id="play-btn">🔊 Dëgjo muzikën</button>
</div>

<script>
  // ---------- 1) EMOJI QË BIEN SI SHI ----------
  const emojiList = ["🎉", "👑", "🎂"];
  const emojiContainer = document.getElementById("emoji-container");
  const totalEmojis = 16; // pak, per te mos mbuluar ekranin

  for (let i = 0; i < totalEmojis; i++) {
    const span = document.createElement("span");
    span.className = "emoji";
    span.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];

    const leftPos = Math.random() * 100; // pozicioni horizontal (%)
    const fallDuration = 4 + Math.random() * 3; // 4-7 sek per rene, me qete
    const swayDuration = 2.5 + Math.random() * 2;
    const delay = Math.random() * 4; // vonesa fillimi
    const size = 1.1 + Math.random() * 1; // madhesia rem, me e vogel

    span.style.left = leftPos + "vw";
    span.style.fontSize = size + "rem";
    span.style.animationDuration = fallDuration + "s, " + swayDuration + "s";
    span.style.animationDelay = delay + "s, " + delay + "s";

    emojiContainer.appendChild(span);
  }

  // ---------- 2) FJALËT "GËZUAR DITËLINDJEN" NË 10 GJUHË ----------
  const greetings = [
    "Gëzuar Ditëlindjen!",       // Shqip
    "Happy Birthday!",           // Anglisht
    "Feliz Cumpleaños!",         // Spanjisht
    "Joyeux Anniversaire!",      // Frëngjisht
    "Alles Gute zum Geburtstag!",// Gjermanisht
    "Buon Compleanno!",          // Italisht
    "Feliz Aniversário!",        // Portugalisht
    "С Днём Рождения!",          // Rusisht
    "お誕生日おめでとう！",         // Japonisht
    "生日快乐！"                  // Kinezisht
  ];

  const greetingContainer = document.getElementById("greeting");
  const perWord = 3; // 3 sekonda per gjuhe - shume me e ngadalte
  const textTotalDuration = perWord * greetings.length; // 30 sekonda gjithsej

  function renderGreetings() {
    greetingContainer.innerHTML = "";
    greetings.forEach((text, index) => {
      const div = document.createElement("div");
      div.className = "greeting-text";
      div.textContent = text;
      div.style.animationDuration = perWord + "s";
      div.style.animationDelay = (index * perWord) + "s";
      greetingContainer.appendChild(div);
    });
  }

  renderGreetings();
  // Rinis ciklin e teksteve ne shpejtesine e vet, te ndare nga emoji/muzika
  setInterval(renderGreetings, textTotalDuration * 1000);

  // ---------- 3) MELODI ORIGJINALE - BALADË E BUTË, SI PIANO E NGROHTË (Web Audio API) ----------
  // 100% origjinale, sintetizuar në kohë reale - pa asnjë material me të drejta autori.
  let audioCtx;
  let dryBus, reverbBus;

  function buildAudioGraph() {
    dryBus = audioCtx.createGain();
    dryBus.gain.value = 0.85;
    dryBus.connect(audioCtx.destination);

    // Reverb i ngrohte, si dhome e vogel druri - per ndjesi baladë, intime
    reverbBus = audioCtx.createGain();
    reverbBus.gain.value = 0.5;

    const convolver = audioCtx.createConvolver();
    const sampleRate = audioCtx.sampleRate;
    const length = sampleRate * 2.2;
    const impulse = audioCtx.createBuffer(2, length, sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
      }
    }
    convolver.buffer = impulse;

    reverbBus.connect(convolver);
    convolver.connect(audioCtx.destination);
  }

  const noteFreq = {
    "C3": 130.81, "D3": 146.83, "E3": 164.81, "F3": 174.61, "G3": 196.00, "A3": 220.00, "B3": 246.94,
    "C4": 261.63, "D4": 293.66, "E4": 329.63, "F4": 349.23, "G4": 392.00, "A4": 440.00
  };

  // Progresion akordesh i ngrohtë, emocional - Am - F - C - G (klasik për baladë të butë)
  const chords = [
    ["A3", "C4", "E4"],
    ["F3", "A3", "C4"],
    ["C3", "E3", "G3"],
    ["G3", "B3", "D4"]
  ];
  const chordDuration = 1.25; // sekonda per akord

  // Melodi e thjeshtë, e ngadaltë, e ëmbël - mbi progresionin e akordeve
  const melody = [
    ["E4", 0.6], ["C4", 0.65],
    ["A3", 0.6], ["C4", 0.65],
    ["E4", 0.6], ["D4", 0.65],
    ["C4", 0.6], ["A3", 0.65]
  ];

  // Zë pad i butë - për akordet, si piano e mbajtur me pedale, shumë e qetë
  function playPadNote(freq, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const filter = audioCtx.createBiquadFilter();
    const gainNode = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, startTime);

    filter.type = "lowpass";
    filter.frequency.setValueAtTime(1200, startTime);
    filter.Q.setValueAtTime(0.5, startTime);

    // Sulm i ngadaltë e i butë, si notë e mbajtur me pedale piano
    gainNode.gain.setValueAtTime(0, startTime);
    gainNode.gain.linearRampToValueAtTime(0.045, startTime + 0.5);
    gainNode.gain.linearRampToValueAtTime(0.03, startTime + duration * 0.6);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

    osc.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(dryBus);
    gainNode.connect(reverbBus);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
  }

  // Zë melodie - piano e ëmbël, e ngrohtë, pa harmonikë të mprehtë (jo "qark")
  function playMelodyNote(freq, startTime, duration) {
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const filter = audioCtx.createBiquadFilter();
    const gainNode = audioCtx.createGain();
    const gain2 = audioCtx.createGain();

    osc1.type = "sine";
    osc2.type = "triangle";
    osc1.frequency.setValueAtTime(freq, startTime);
    osc2.frequency.setValueAtTime(freq, startTime);
    osc2.detune.setValueAtTime(4, startTime); // celeste te lehte, pa asnje vibrato te shpejte

    filter.type = "lowpass";
    filter.frequency.setValueAtTime(2200, startTime);
    filter.Q.setValueAtTime(0.4, startTime);

    // Sulm i butë e i ngadaltë - si gisht që shtyp një tast piano me dashamirësi
    gainNode.gain.setValueAtTime(0, startTime);
    gainNode.gain.linearRampToValueAtTime(0.16, startTime + 0.07);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

    gain2.gain.setValueAtTime(0, startTime);
    gain2.gain.linearRampToValueAtTime(0.05, startTime + 0.08);
    gain2.gain.exponentialRampToValueAtTime(0.0001, startTime + duration * 0.85);

    osc1.connect(filter);
    osc2.connect(gain2);
    filter.connect(gainNode);

    gainNode.connect(dryBus);
    gainNode.connect(reverbBus);
    gain2.connect(dryBus);
    gain2.connect(reverbBus);

    [osc1, osc2].forEach(o => {
      o.start(startTime);
      o.stop(startTime + duration + 0.15);
    });
  }

  function playChordsOnce(startTime) {
    let t = startTime;
    chords.forEach(chordNotes => {
      chordNotes.forEach(note => {
        playPadNote(noteFreq[note], t, chordDuration + 0.3);
      });
      t += chordDuration;
    });
  }

  function playMelodyOnce(startTime) {
    let t = startTime;
    melody.forEach(([note, dur]) => {
      playMelodyNote(noteFreq[note], t, dur * 0.95);
      t += dur;
    });
  }

  function startMusic() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      buildAudioGraph();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    const now = audioCtx.currentTime + 0.1;
    // Fraza zgjat 5 sekonda, e luajme dy herë për të mbushur ciklin 10-sekondësh
    playChordsOnce(now);
    playMelodyOnce(now);
    playChordsOnce(now + 5);
    playMelodyOnce(now + 5);
  }

  // Butoni i dukshëm "Dëgjo muzikën" - mënyra kryesore dhe e sigurt për ta nisur tingullin
  const playBtn = document.getElementById("play-btn");
  playBtn.addEventListener("click", () => {
    startMusic();
    playBtn.textContent = "🔊 Po luan...";
    setTimeout(() => { playBtn.textContent = "🔁 Dëgjo përsëri"; }, 800);
  });

  // Provo edhe automatikisht ne ngarkim (disa shfletues e lejojne)
  window.addEventListener("load", () => {
    startMusic();
  });

  // ---------- 4) Rifillo emoji dhe muzikën çdo 10 sekonda (loop) ----------
  setInterval(() => {
    emojiContainer.innerHTML = "";
    for (let i = 0; i < totalEmojis; i++) {
      const span = document.createElement("span");
      span.className = "emoji";
      span.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
      span.style.left = (Math.random() * 100) + "vw";
      span.style.fontSize = (1.1 + Math.random() * 1) + "rem";
      const fallDuration = 4 + Math.random() * 3;
      const swayDuration = 2.5 + Math.random() * 2;
      const delay = Math.random() * 4;
      span.style.animationDuration = fallDuration + "s, " + swayDuration + "s";
      span.style.animationDelay = delay + "s, " + delay + "s";
      emojiContainer.appendChild(span);
    }

    // Rinis edhe melodine origjinale ne cdo cikel te ri
    startMusic();
  }, 10000);
</script>

</body>
</html>
